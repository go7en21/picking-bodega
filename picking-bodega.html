<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Picking - Bodega</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
    .header{background:#1e293b;border-bottom:2px solid #334155;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:1.4rem;font-weight:700;color:#f1f5f9}.header h1 span{color:#38bdf8}.header-actions{display:flex;gap:10px}
    .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s}.btn-primary{background:#0ea5e9;color:#fff}.btn-primary:hover{background:#0284c7}.btn-success{background:#22c55e;color:#fff}.btn-success:hover{background:#16a34a}.btn-warning{background:#f59e0b;color:#fff}.btn-warning:hover{background:#d97706}.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}.btn-ghost{background:#334155;color:#94a3b8}.btn-ghost:hover{background:#475569;color:#e2e8f0}.btn-sm{padding:5px 10px;font-size:.78rem}.btn-xs{padding:3px 7px;font-size:.72rem}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px}.stat-card{background:#1e293b;border-radius:12px;padding:16px 20px;border:1px solid #334155}.stat-card .label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.stat-card .value{font-size:1.8rem;font-weight:700}.stat-card.total .value{color:#38bdf8}.stat-card.occupied .value{color:#22c55e}.stat-card.free .value{color:#94a3b8}.stat-card.percent .value{color:#f59e0b}
    .toolbar{padding:0 24px 16px;display:flex;gap:12px;align-items:center}.search-input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 14px;color:#e2e8f0;font-size:.9rem;outline:none;max-width:400px}.search-input:focus,.filter-select:focus{border-color:#0ea5e9}.search-input::placeholder{color:#475569}.filter-select{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#e2e8f0;font-size:.85rem;outline:none;cursor:pointer}.view-toggle{display:flex;background:#1e293b;border-radius:8px;overflow:hidden;border:1px solid #334155}.view-btn{padding:8px 14px;border:none;background:transparent;color:#64748b;cursor:pointer;font-size:.85rem;transition:.2s}.view-btn.active{background:#0ea5e9;color:#fff}
    .section-title{font-size:.75rem;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:0 24px 10px;font-weight:600}.content{padding:0 24px 24px}.warehouse-map{display:flex;flex-direction:column;gap:6px}.aisle-row{background:#1e293b;border-radius:10px;border:1px solid #334155;overflow:hidden}.aisle-header{background:#0f172a;padding:8px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}.aisle-header:hover{background:#1a2540}.aisle-label{font-size:1rem;font-weight:700;color:#38bdf8;min-width:72px}.aisle-info{font-size:.78rem;color:#64748b}.aisle-progress{flex:1;height:6px;background:#334155;border-radius:3px;overflow:hidden;max-width:200px}.aisle-progress-bar{height:100%;background:#22c55e;border-radius:3px;transition:width .3s}.aisle-pct{font-size:.75rem;color:#64748b;min-width:40px;text-align:right}.aisle-toggle{color:#475569;font-size:.9rem;margin-left:8px}.aisle-grid{padding:10px 14px 14px;display:none;flex-wrap:wrap;gap:5px}.aisle-grid.open{display:flex}
    .cell{width:68px;height:60px;border-radius:7px;border:1.5px solid #334155;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.15s;position:relative;font-size:.65rem;text-align:center;padding:3px;gap:1px}.cell:hover{transform:scale(1.05);z-index:2}.cell.free{background:#0f172a;color:#475569;border-color:#334155}.cell.free:hover{border-color:#0ea5e9;color:#38bdf8;background:#0c1e32}.cell.occupied{background:#052e16;border-color:#166534;color:#4ade80}.cell.occupied:hover{background:#14532d;border-color:#22c55e}.cell.multi{background:#0c1a38;border-color:#1d4ed8}.cell.multi:hover{background:#1e3a5f;border-color:#3b82f6}.location-code{font-size:.68rem;font-weight:700;color:#64748b}.cell.occupied .location-code{color:#86efac}.cell.multi .location-code{color:#93c5fd}.product-code{font-size:.62rem;font-weight:700;color:#4ade80;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60px}.cell.multi .product-code{color:#60a5fa}.product-qty{font-size:.58rem;color:#22c55e}.plus-icon{font-size:1.1rem;color:#334155}.cell.free:hover .plus-icon{color:#0ea5e9}.multi-badge{font-size:.58rem;background:#1d4ed8;color:#bfdbfe;padding:1px 5px;border-radius:99px;font-weight:700}
    .list-table{width:100%;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden;border:1px solid #334155}.list-table th{background:#0f172a;padding:10px 14px;text-align:left;font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #334155}.list-table td{padding:9px 14px;font-size:.85rem;border-bottom:1px solid #1e2d40}.list-table tr:last-child td{border-bottom:none}.list-table tr:hover td{background:#243044}.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.72rem;font-weight:600}.badge.green{background:#052e16;color:#4ade80}.badge.blue{background:#0c1a38;color:#60a5fa}.badge.gray{background:#1e293b;color:#475569;border:1px solid #334155}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}.modal-overlay.open{display:flex}.modal{background:#1e293b;border-radius:16px;border:1px solid #334155;width:520px;max-width:95vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}.modal-header{padding:16px 22px;background:#0f172a;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155;flex-shrink:0}.modal-header h2{font-size:1rem;font-weight:700;color:#f1f5f9}.modal-location{font-size:.85rem;color:#38bdf8;font-weight:600;background:#0c2540;padding:4px 10px;border-radius:6px}.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px;overflow:auto;flex:1}.form-section{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px}.form-section-title{font-size:.8rem;color:#38bdf8;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}.form-group label{display:block;font-size:.78rem;color:#94a3b8;margin-bottom:5px;font-weight:600}.form-group input,.form-group select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#e2e8f0;font-size:.9rem;outline:none;transition:border .2s}.form-group input:focus,.form-group select:focus{border-color:#0ea5e9}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.modal-footer{padding:14px 22px;background:#0f172a;border-top:1px solid #334155;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}.modal-close{background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer;padding:4px;border-radius:4px}.modal-close:hover{color:#e2e8f0;background:#334155}.product-list-header{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:8px}.empty-product-list{text-align:center;padding:12px;color:#475569;font-size:.82rem;background:#0f172a;border-radius:8px;border:1px dashed #334155}.product-item{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}.product-item.editing{border-color:#0ea5e9;background:#0c1e32}.product-item-info{flex:1;min-width:0}.product-item-code{font-size:.85rem;font-weight:700;color:#38bdf8}.product-item-name{font-size:.78rem;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.product-item-qty{font-size:.75rem;color:#4ade80;font-weight:600;white-space:nowrap}.product-item-actions{display:flex;gap:5px;flex-shrink:0}.product-list{display:flex;flex-direction:column;gap:6px}.export-info{background:#0f172a;border-radius:8px;padding:12px;font-size:.8rem;color:#94a3b8;border:1px solid #334155}.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 18px;font-size:.85rem;color:#e2e8f0;z-index:200;display:none;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)}.toast.show{display:flex;animation:slideIn .3s ease}.toast.success{border-color:#166534}.toast.error{border-color:#7f1d1d}@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}.no-results{text-align:center;padding:48px;color:#475569}.no-results .icon{font-size:2.5rem;margin-bottom:10px}.divider{border:none;border-top:1px solid #334155;margin:4px 0}
    @media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.cell{width:58px;height:52px}.toolbar{flex-wrap:wrap}.header{flex-direction:column;gap:12px;align-items:flex-start}}
  </style>
</head>
<body>
  <div class="header">
    <h1>📦 Sistema de <span>Picking</span> · Bodega</h1>
    <div class="header-actions">
      <button class="btn btn-success btn-sm" onclick="openExportModal()">⬇ Exportar a Odoo (CSV)</button>
      <button class="btn btn-warning btn-sm" onclick="clearAll()">🗑 Limpiar todo</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input class="search-input" type="text" id="searchInput" placeholder="🔍 Buscar por código, nombre o ubicación..." oninput="onSearch()" />
    <select class="filter-select" id="aisleFilter" onchange="renderMap()"><option value="all">Todos los pasillos</option></select>
    <select class="filter-select" id="statusFilter" onchange="renderMap()">
      <option value="all">Todas</option><option value="occupied">Ocupadas</option><option value="free">Libres</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="btnMap" onclick="setView('map')">🗺 Mapa</button>
      <button class="view-btn" id="btnList" onclick="setView('list')">📋 Lista</button>
    </div>
  </div>

  <div class="section-title" id="sectionTitle">Mapa de Bodega</div>
  <div class="content" id="mainContent"></div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modalTitle">Gestionar Ubicación</h2>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="modal-location" id="modalLoc">-</span>
          <button class="modal-close" onclick="closeModalBtn()">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div>
          <div class="product-list-header">Productos en esta ubicación</div>
          <div id="productList"></div>
        </div>
        <div class="form-section">
          <div class="form-section-title" id="formTitle">➕ Agregar producto</div>
          <div class="form-row">
            <div class="form-group"><label>Código producto</label><input id="productCode" type="text" placeholder="Ej: SKU-001"></div>
            <div class="form-group"><label>Cantidad</label><input id="productQty" type="number" min="1" placeholder="0"></div>
          </div>
          <div class="form-group" style="margin-top:12px"><label>Nombre / descripción</label><input id="productName" type="text" placeholder="Descripción del producto"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="cancelEdit()" id="cancelEditBtn" style="display:none">Cancelar edición</button>
        <button class="btn btn-primary" onclick="saveProduct()" id="saveBtn">Guardar</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="exportOverlay" onclick="closeExportModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h2>Exportar a Odoo</h2><button class="modal-close" onclick="closeExportModalBtn()">✕</button></div>
      <div class="modal-body">
        <div class="export-info">Se generará un CSV con columnas: <b>Ubicación</b>, <b>Código</b>, <b>Nombre</b>, <b>Cantidad</b>.</div>
      </div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeExportModalBtn()">Cancelar</button><button class="btn btn-success" onclick="exportCSV()">Descargar CSV</button></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Configuración real de ubicaciones según tabla entregada:
    // Pasillo / rango de columnas / cantidad de filas.
    const WAREHOUSE_CONFIG = {
      // Orden alfabético descendente desde Z, saltando la letra T.
      // Se reemplaza C por U y, para mantener 14 pasillos, se agrega L al final.
      aisles: ['Z','Y','X','W','V','U','S','R','Q','P','O','N','M','L'],
      aisleConfig: {
        Z: { colStart: 1, colEnd: 3, rows: 7 },
        Y: { colStart: 1, colEnd: 3, rows: 7 },
        X: { colStart: 1, colEnd: 5, rows: 7 },
        W: { colStart: 1, colEnd: 5, rows: 7 },
        V: { colStart: 1, colEnd: 5, rows: 7 },
        U: { colStart: 1, colEnd: 5, rows: 7 },
        S: { colStart: 1, colEnd: 5, rows: 7 },
        R: { colStart: 1, colEnd: 6, rows: 7 },
        Q: { colStart: 3, colEnd: 8, rows: 7 },
        P: { colStart: 3, colEnd: 8, rows: 7 },
        O: { colStart: 1, colEnd: 8, rows: 7 },
        N: { colStart: 1, colEnd: 8, rows: 7 },
        M: { colStart: 1, colEnd: 8, rows: 7 },
        L: { colStart: 1, colEnd: 8, rows: 7 }
      }
    };

    const STORAGE_KEY = 'picking_bodega_data_v3_alfabetico_sin_t';
    let viewMode = 'map';
    let selectedLocation = null;
    let editingIndex = null;
    let openAisles = new Set(WAREHOUSE_CONFIG.aisles);

    let warehouseData = loadData();

    function buildLocations(){
      const rows = [];
      WAREHOUSE_CONFIG.aisles.forEach(aisle => {
        const cfg = WAREHOUSE_CONFIG.aisleConfig[aisle];
        for(let col = cfg.colStart; col <= cfg.colEnd; col++){
          for(let row = 1; row <= cfg.rows; row++){
            // Formato: PASILLO-COLUMNA-FILA. Ejemplo: Z-01-01, R-03-07, M-08-07.
            const code = `${aisle}-${String(col).padStart(2,'0')}-${String(row).padStart(2,'0')}`;
            rows.push({ location: code, aisle, column: col, row, products: [] });
          }
        }
      });
      return rows;
    }

    function loadData(){
      try{
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        const base = buildLocations();
        if(!Array.isArray(saved)) return base;
        return base.map(loc => {
          const found = saved.find(x => x.location === loc.location);
          return found ? { ...loc, products: Array.isArray(found.products) ? found.products : [] } : loc;
        });
      }catch(e){
        return buildLocations();
      }
    }

    function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(warehouseData)); }

    function init(){
      const select = document.getElementById('aisleFilter');
      WAREHOUSE_CONFIG.aisles.forEach(aisle => {
        const option = document.createElement('option');
        option.value = aisle;
        option.textContent = `Pasillo ${aisle}`;
        select.appendChild(option);
      });
      renderStats();
      renderMap();
    }

    function getFilteredData(){
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const aisle = document.getElementById('aisleFilter').value;
      const status = document.getElementById('statusFilter').value;
      return warehouseData.filter(loc => {
        const occupied = loc.products.length > 0;
        const matchesAisle = aisle === 'all' || loc.aisle === aisle;
        const matchesStatus = status === 'all' || (status === 'occupied' && occupied) || (status === 'free' && !occupied);
        const matchesSearch = !q || loc.location.toLowerCase().includes(q) || loc.products.some(p => `${p.code} ${p.name}`.toLowerCase().includes(q));
        return matchesAisle && matchesStatus && matchesSearch;
      });
    }

    function renderStats(){
      const total = warehouseData.length;
      const occupied = warehouseData.filter(l => l.products.length > 0).length;
      const free = total - occupied;
      const percent = total ? Math.round((occupied / total) * 100) : 0;
      document.getElementById('stats').innerHTML = `
        <div class="stat-card total"><div class="label">Ubicaciones</div><div class="value">${total}</div></div>
        <div class="stat-card occupied"><div class="label">Ocupadas</div><div class="value">${occupied}</div></div>
        <div class="stat-card free"><div class="label">Libres</div><div class="value">${free}</div></div>
        <div class="stat-card percent"><div class="label">Ocupación</div><div class="value">${percent}%</div></div>`;
    }

    function renderMap(){
      renderStats();
      document.getElementById('sectionTitle').textContent = viewMode === 'map' ? 'Mapa de Bodega' : 'Listado de Ubicaciones';
      document.getElementById('btnMap').classList.toggle('active', viewMode === 'map');
      document.getElementById('btnList').classList.toggle('active', viewMode === 'list');
      if(viewMode === 'list') return renderList();

      const data = getFilteredData();
      const grouped = WAREHOUSE_CONFIG.aisles.map(aisle => ({ aisle, locations: data.filter(l => l.aisle === aisle) })).filter(g => g.locations.length);

      if(!grouped.length){
        document.getElementById('mainContent').innerHTML = `<div class="no-results"><div class="icon">🔎</div>No hay ubicaciones para el filtro seleccionado.</div>`;
        return;
      }

      document.getElementById('mainContent').innerHTML = `<div class="warehouse-map">${grouped.map(group => {
        const total = group.locations.length;
        const occupied = group.locations.filter(l => l.products.length > 0).length;
        const pct = total ? Math.round((occupied / total) * 100) : 0;
        const isOpen = openAisles.has(group.aisle);
        return `<div class="aisle-row">
          <div class="aisle-header" onclick="toggleAisle('${group.aisle}')">
            <div class="aisle-label">Pasillo ${group.aisle}</div>
            <div class="aisle-info">${occupied}/${total} ocupadas</div>
            <div class="aisle-progress"><div class="aisle-progress-bar" style="width:${pct}%"></div></div>
            <div class="aisle-pct">${pct}%</div><div class="aisle-toggle">${isOpen ? '▾' : '▸'}</div>
          </div>
          <div class="aisle-grid ${isOpen ? 'open' : ''}">${group.locations.map(renderCell).join('')}</div>
        </div>`;
      }).join('')}</div>`;
    }

    function renderCell(loc){
      let cls = 'free';
      if(loc.products.length === 1) cls = 'occupied';
      if(loc.products.length > 1) cls = 'multi';
      const content = loc.products.length === 0
        ? `<div class="location-code">${loc.location}</div><div class="plus-icon">＋</div>`
        : loc.products.length === 1
          ? `<div class="location-code">${loc.location}</div><div class="product-code">${escapeHtml(loc.products[0].code)}</div><div class="product-qty">Cant: ${loc.products[0].qty}</div>`
          : `<div class="location-code">${loc.location}</div><div class="multi-badge">${loc.products.length} productos</div>`;
      return `<div class="cell ${cls}" onclick="openLocation('${loc.location}')">${content}</div>`;
    }

    function renderList(){
      const data = getFilteredData();
      if(!data.length){ document.getElementById('mainContent').innerHTML = `<div class="no-results"><div class="icon">🔎</div>No hay ubicaciones para el filtro seleccionado.</div>`; return; }
      const rows = data.flatMap(loc => {
        if(!loc.products.length){
          return [`<tr onclick="openLocation('${loc.location}')"><td>${loc.location}</td><td><span class="badge gray">Libre</span></td><td>-</td><td>-</td><td>-</td></tr>`];
        }
        return loc.products.map((p, i) => `<tr onclick="openLocation('${loc.location}')"><td>${i === 0 ? loc.location : ''}</td><td><span class="badge ${loc.products.length > 1 ? 'blue' : 'green'}">${loc.products.length > 1 ? 'Múltiple' : 'Ocupada'}</span></td><td>${escapeHtml(p.code)}</td><td>${escapeHtml(p.name || '-')}</td><td>${p.qty}</td></tr>`);
      }).join('');
      document.getElementById('mainContent').innerHTML = `<table class="list-table"><thead><tr><th>Ubicación</th><th>Estado</th><th>Código</th><th>Producto</th><th>Cantidad</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function toggleAisle(aisle){ openAisles.has(aisle) ? openAisles.delete(aisle) : openAisles.add(aisle); renderMap(); }
    function setView(mode){ viewMode = mode; renderMap(); }
    function onSearch(){ renderMap(); }

    function openLocation(location){
      selectedLocation = warehouseData.find(l => l.location === location);
      editingIndex = null;
      document.getElementById('modalLoc').textContent = location;
      document.getElementById('modalTitle').textContent = 'Gestionar Ubicación';
      clearForm();
      renderProductList();
      document.getElementById('modalOverlay').classList.add('open');
    }

    function renderProductList(){
      const list = document.getElementById('productList');
      if(!selectedLocation.products.length){ list.innerHTML = `<div class="empty-product-list">Esta ubicación está libre.</div>`; return; }
      list.innerHTML = `<div class="product-list">${selectedLocation.products.map((p,i) => `<div class="product-item ${editingIndex === i ? 'editing' : ''}">
        <div class="product-item-info"><div class="product-item-code">${escapeHtml(p.code)}</div><div class="product-item-name">${escapeHtml(p.name || '-')}</div></div>
        <div class="product-item-qty">Cant: ${p.qty}</div>
        <div class="product-item-actions"><button class="btn btn-ghost btn-xs" onclick="editProduct(${i})">Editar</button><button class="btn btn-danger btn-xs" onclick="deleteProduct(${i})">Eliminar</button></div>
      </div>`).join('')}</div>`;
    }

    function saveProduct(){
      if(!selectedLocation) return;
      const code = document.getElementById('productCode').value.trim();
      const name = document.getElementById('productName').value.trim();
      const qty = Number(document.getElementById('productQty').value);
      if(!code || !qty || qty <= 0){ showToast('Debe ingresar código y cantidad válida.', 'error'); return; }
      const item = { code, name, qty };
      if(editingIndex !== null) selectedLocation.products[editingIndex] = item;
      else selectedLocation.products.push(item);
      saveData(); renderStats(); renderMap(); renderProductList(); clearForm(); showToast('Ubicación actualizada.', 'success');
    }

    function editProduct(index){
      editingIndex = index;
      const p = selectedLocation.products[index];
      document.getElementById('productCode').value = p.code;
      document.getElementById('productName').value = p.name || '';
      document.getElementById('productQty').value = p.qty;
      document.getElementById('formTitle').textContent = '✏ Editar producto';
      document.getElementById('saveBtn').textContent = 'Actualizar';
      document.getElementById('cancelEditBtn').style.display = 'inline-block';
      renderProductList();
    }

    function deleteProduct(index){
      selectedLocation.products.splice(index,1);
      saveData(); renderStats(); renderMap(); renderProductList(); clearForm(); showToast('Producto eliminado.', 'success');
    }

    function cancelEdit(){ clearForm(); renderProductList(); }
    function clearForm(){
      editingIndex = null;
      document.getElementById('productCode').value = '';
      document.getElementById('productName').value = '';
      document.getElementById('productQty').value = '';
      document.getElementById('formTitle').textContent = '➕ Agregar producto';
      document.getElementById('saveBtn').textContent = 'Guardar';
      document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function closeModal(e){ if(e.target.id === 'modalOverlay') closeModalBtn(); }
    function closeModalBtn(){ document.getElementById('modalOverlay').classList.remove('open'); selectedLocation = null; clearForm(); }
    function openExportModal(){ document.getElementById('exportOverlay').classList.add('open'); }
    function closeExportModal(e){ if(e.target.id === 'exportOverlay') closeExportModalBtn(); }
    function closeExportModalBtn(){ document.getElementById('exportOverlay').classList.remove('open'); }

    function exportCSV(){
      const rows = [['Ubicacion','Codigo','Nombre','Cantidad']];
      warehouseData.forEach(loc => loc.products.forEach(p => rows.push([loc.location,p.code,p.name || '',p.qty])));
      const csv = rows.map(r => r.map(v => `"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'ubicaciones_odoo.csv'; a.click(); URL.revokeObjectURL(url);
      closeExportModalBtn(); showToast('CSV exportado.', 'success');
    }

    function clearAll(){
      if(!confirm('¿Seguro que quieres limpiar todos los productos guardados?')) return;
      warehouseData.forEach(l => l.products = []);
      saveData(); renderStats(); renderMap(); showToast('Bodega limpiada.', 'success');
    }

    function showToast(msg, type='success'){
      const toast = document.getElementById('toast'); toast.textContent = msg; toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function escapeHtml(value){
      return String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }

    init();
  </script>
</body>
</html>
